
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>打怪遊戲</title>
</head>
<body>

<h2>⚔️ 打怪升級（完整可下載版）</h2>

<p id="status"></p>
<p id="monster"></p>

<button onclick="fight()">攻擊 👊</button>
<button onclick="skill()">技能 🔥</button>
<button onclick="rest()">休息 🛌</button>
<button onclick="resetGame()">重置 🔄</button>

<script>
let player = {hp:30, atk:5, level:1, exp:0};
let monster = null;

// 讀存檔
function loadGame(){
    let data = localStorage.getItem("save");
    if(data){
        player = JSON.parse(data);
    }
}
loadGame();

// 存檔
function saveGame(){
    localStorage.setItem("save", JSON.stringify(player));
}

function newMonster(){
    monster = {
        hp: Math.floor(Math.random()*15)+10,
        atk: Math.floor(Math.random()*4)+3
    };
}

function update(){
    document.getElementById("status").innerText =
        `你｜HP:${player.hp} 攻擊:${player.atk} 等級:${player.level} EXP:${player.exp}`;

    if(monster){
        document.getElementById("monster").innerText =
            `怪物｜HP:${monster.hp} 攻擊:${monster.atk}`;
    } else {
        document.getElementById("monster").innerText = "沒有怪物";
    }

    saveGame();
}

// 普通攻擊
function fight(){
    if(!monster) newMonster();

    let dmg = Math.floor(Math.random()*5)+player.atk;
    monster.hp -= dmg;

    battle();
}

// 技能
function skill(){
    if(!monster) newMonster();

    let dmg = Math.floor(Math.random()*10)+player.atk+3;
    monster.hp -= dmg;

    alert("🔥 技能造成 " + dmg + " 傷害！");
    battle();
}

// 戰鬥結算
function battle(){
    if(monster.hp <= 0){
        player.exp += 5;
        monster = null;

        if(player.exp >= player.level*10){
            player.level++;
            player.hp += 10;
            player.atk += 2;
            player.exp = 0;
            alert("🎉 升級！");
        }
    } else {
        let mdmg = Math.floor(Math.random()*3)+monster.atk;
        player.hp -= mdmg;

        if(player.hp <= 0){
            alert("💀 死亡！HP重置");
            player.hp = 30;
        }
    }

    update();
}

// 休息
function rest(){
    player.hp += 5;
    update();
}

// 重置
function resetGame(){
    localStorage.removeItem("save");
    player = {hp:30, atk:5, level:1, exp:0};
    monster = null;
    update();
    alert("已重置！");
}

update();
</script>

</body>
</html>
