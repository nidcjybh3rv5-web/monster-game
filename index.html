<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MONSTER GAME</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
  }

  body {
    background: radial-gradient(circle at 20% 30%, #1a2a3a, #0a0f1e);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, Helvetica, Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
  }

  /* 液態玻璃容器 */
  .app {
    width: 100%;
    max-width: 500px;
    margin: 20px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(25px) saturate(180%);
    border-radius: 48px;
    padding: 24px 20px 32px;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
  }

  .page { display: none; }
  .page.active { display: block; }

  /* 標題液態光澤 */
  .main-title {
    font-size: 2rem;
    font-weight: 700;
    background: linear-gradient(135deg, #FFE6B0, #FFB347);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin: 30px 0;
  }

  .play-btn {
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    color: white;
    padding: 14px 28px;
    border-radius: 60px;
    font-size: 1.3rem;
    font-weight: bold;
    cursor: pointer;
    margin: 20px 0;
    width: 70%;
    transition: 0.2s;
  }
  .play-btn:active { transform: scale(0.97); background: rgba(255,255,255,0.3); }

  .settings-btn {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: #ddd;
    padding: 8px 20px;
    border-radius: 30px;
    cursor: pointer;
  }

  .setting-item {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(8px);
    border-radius: 28px;
    padding: 14px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    text-align: left;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  .discord-btn-small, .lang-btn, .back-btn {
    background: rgba(255, 255, 255, 0.15);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 30px;
    padding: 6px 14px;
    color: white;
    font-size: 0.75rem;
    font-weight: bold;
    cursor: pointer;
  }

  .difficulty-select {
    background: rgba(0, 0, 0, 0.5);
    color: white;
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 20px;
    padding: 6px 12px;
  }

  .switch {
    position: relative;
    display: inline-block;
    width: 48px;
    height: 24px;
  }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute;
    cursor: pointer;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #475569;
    border-radius: 24px;
  }
  .slider:before {
    position: absolute;
    content: "";
    height: 18px;
    width: 18px;
    left: 3px;
    bottom: 3px;
    background: white;
    border-radius: 50%;
  }
  input:checked + .slider { background: #3b82f6; }
  input:checked + .slider:before { transform: translateX(24px); }

  input[type="range"] {
    width: 140px;
    height: 4px;
    -webkit-appearance: none;
    background: #475569;
    border-radius: 2px;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #3b82f6;
    cursor: pointer;
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    margin: 12px 0;
    font-weight: bold;
  }
  .bar {
    background: rgba(0, 0, 0, 0.5);
    border-radius: 20px;
    height: 18px;
    overflow: hidden;
    margin: 8px 0;
  }
  .fillhp { background: #ef4444; height: 100%; }
  .fillexp { background: #3b82f6; height: 100%; }

  .enemy-icon { font-size: 56px; margin: 12px; }
  .log {
    background: rgba(0, 0, 0, 0.5);
    border-radius: 28px;
    padding: 12px;
    margin: 16px 0;
    font-size: 0.85rem;
    backdrop-filter: blur(4px);
  }
  .buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    margin-top: 16px;
  }
  button.game-action {
    padding: 10px 20px;
    border-radius: 40px;
    font-weight: bold;
    border: none;
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(10px);
    color: white;
    font-size: 1.2rem;
    cursor: pointer;
  }
  .attack { background: #dc2626; }
  .skill { background: #2563eb; }
  .rest { background: #16a34a; }
  .save { background: #9333ea; }
</style>
</head>
<body>
<div class="app">
  <!-- 主畫面 -->
  <div id="mainPage" class="page active">
    <div class="main-title">MONSTER GAME</div>
    <button class="play-btn" id="toGameBtn">▶ PLAY GAME</button><br>
    <button class="settings-btn" id="toSettingsBtn">⚙ SETTINGS</button>
    <div style="margin-top:30px; font-size:0.7rem;">Beta 1.3.0</div>
  </div>

  <!-- 設定畫面 -->
  <div id="settingsPage" class="page">
    <button class="back-btn" id="backFromSettings">← BACK</button>
    <h3>Settings</h3>
    <div class="setting-item"><span>🔊 Volume</span><input type="range" id="volumeSlider" min="0" max="100" value="70"></div>
    <div class="setting-item"><span>🔔 SFX</span><label class="switch"><input type="checkbox" id="sfxToggle" checked><span class="slider"></span></label></div>
    <div class="setting-item"><span>⚔️ Difficulty</span><select id="difficultySelect"><option value="easy">🎈 Easy</option><option value="normal" selected>⚖️ Normal</option><option value="hard">🔥 Hard</option></select></div>
    <div class="setting-item"><span>🐛 BUG REPORT</span><button class="discord-btn-small" id="reportBugBtn">SEND</button></div>
    <div class="setting-item"><span>💬 Discord</span><button class="discord-btn-small" id="discordLinkBtn">JOIN</button></div>
    <div class="setting-item"><span>🌐 Language</span><div><button class="lang-btn" onclick="setLang('zh')">中文</button><button class="lang-btn" onclick="setLang('en')">EN</button></div></div>
  </div>

  <!-- 遊戲畫面 -->
  <div id="gamePage" class="page">
    <button class="back-btn" id="backFromGame">← MENU</button>
    <div class="stat-row"><span>❤️</span> <span id="hpText">100/100</span><span>⭐</span> <span id="expText">0/50</span><span>⬆️ Lv</span> <span id="levelText">1</span></div>
    <div class="bar"><div class="fillhp" id="hpBar"></div></div>
    <div class="bar"><div class="fillexp" id="expBar"></div></div>
    <div class="stat-row"><span>⚔️</span> <span id="atkText">10</span><span>🗺️</span> <span id="zoneText">新手村</span></div>
    <h3 id="monsterName">史萊姆</h3>
    <div class="enemy-icon" id="monsterEmoji">🟣</div>
    <div>💀 HP <span id="monsterHpText">0/0</span></div>
    <div class="bar"><div class="fillhp" id="monsterBar"></div></div>
    <div class="log" id="logMsg">Click attack to start</div>
    <div class="buttons">
      <button class="game-action attack" id="attackBtn">⚔️</button>
      <button class="game-action skill" id="skillBtn">🔥</button>
      <button class="game-action rest" id="restBtn">😴</button>
      <button class="game-action save" id="saveBtn">💾</button>
    </div>
  </div>
</div>

<script src="sound.js"></script>
<script src="report.js"></script>
<script src="game.js"></script>
</body>
</html>
