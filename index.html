<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>幻獸鬥士</title>
<link rel="stylesheet" href="css/styles.css">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
<div class="app">
  <!-- 主畫面（極簡版，沒有每日獎勵狀態列）-->
  <div id="mainPage" class="page active">
    <div class="main-title">MONSTER GAME</div>
    <button class="play-btn" id="toGameBtn">▶ 開始遊戲</button>
    <button class="settings-btn" id="toSettingsBtn">⚙️ 設定</button>
    <button class="settings-btn" id="shopBtn">🛒 商店</button>
    <button class="settings-btn" id="helpBtn">❓ 幫助</button>
    <div class="version">v2.0</div>
  </div>

  <!-- 設定畫面 -->
  <div id="settingsPage" class="page">
    <div class="settings-header"><button class="back-btn" id="backFromSettings">← 返回</button><div class="settings-title">設定</div></div>
    <div class="settings-list" id="settingsList"></div>
  </div>

  <!-- 商店畫面 -->
  <div id="shopPage" class="page">
    <div class="settings-header"><button class="back-btn" id="backFromShop">← 返回</button><div class="settings-title">商店</div></div>
    <div style="padding: 16px; text-align: center;">
      <div id="dailyRewardStatus" style="margin-bottom: 20px;">⭐ 每日獎勵</div>
      <button id="claimDailyBtn" class="play-btn" style="width: auto; padding: 10px 20px;">🎁 領取每日獎勵</button>
      <div id="rewardMessage" style="margin-top: 20px;"></div>
    </div>
  </div>

  <!-- 幫助畫面 -->
  <div id="helpPage" class="page">
    <div class="settings-header"><button class="back-btn" id="backFromHelp">← 返回</button><div class="settings-title">幫助</div></div>
    <div class="help-content">
      <p>⚔️ 攻擊：穩定傷害</p>
      <p>🔥 技能：高傷害</p>
      <p>✨ 第二技能：可從設定切換</p>
      <p>😴 休息：每場1次，恢復30HP，會被偷襲</p>
      <p>📈 滿50經驗升級</p>
      <p>🎚️ 難度影響怪物強度</p>
      <p>☁️ Google登入雲端存檔</p>
      <p>🏆 成就自動記錄</p>
      <p>🎁 每日獎勵：每天可領取一次</p>
    </div>
  </div>

  <!-- 遊戲畫面 -->
  <div id="gamePage" class="page">
    <button class="back-btn" id="backFromGame">← 主選單</button>
    <div class="stats-line"><span>❤️ <span id="hpText">100/100</span></span><span>⭐ <span id="expText">0/50</span></span><span>⬆️ Lv <span id="levelText">1</span></span></div>
    <div class="bar"><div class="fillhp" id="hpBar"></div></div>
    <div class="bar"><div class="fillexp" id="expBar"></div></div>
    <div class="stats-line"><span>⚔️ <span id="atkText">10</span></span><span>🗺️ <span id="zoneText">新手村</span></span></div>
    <h3 id="monsterName">史萊姆</h3>
    <div class="enemy-icon" id="monsterEmoji">🟣</div>
    <div>💀 HP <span id="monsterHpText">0/0</span> | ⭐ Lv <span id="monsterLevelText">0</span></div>
    <div class="bar"><div class="fillhp" id="monsterBar"></div></div>
    <div class="log" id="logMsg">點擊攻擊開始</div>
    <div class="buttons">
      <button class="game-action attack" id="attackBtn">⚔️</button>
      <button class="game-action skill" id="skillBtn">🔥</button>
      <button class="game-action skill2" id="skill2Btn">✨</button>
      <button class="game-action rest" id="restBtn">😴</button>
      <button class="game-action save" id="saveBtn">💾</button>
    </div>
  </div>
</div>
<script src="js/utils.js"></script>
<script src="js/sound.js"></script>
<script src="js/achievements.js"></script>
<script src="js/firebase.js"></script>
<script src="js/settings.js"></script>
<script src="js/spotify.js"></script>
<script src="js/game.js"></script>
<script>
  // 簡單的頁面切換邏輯（如果你的 settings.js 已經有 showPage，可刪除此區塊）
  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const target = document.getElementById(id);
    if (target) target.classList.add('active');
  }
  document.getElementById('toGameBtn').onclick = () => showPage('gamePage');
  document.getElementById('toSettingsBtn').onclick = () => showPage('settingsPage');
  document.getElementById('shopBtn').onclick = () => showPage('shopPage');
  document.getElementById('helpBtn').onclick = () => showPage('helpPage');
  document.getElementById('backFromSettings').onclick = () => showPage('mainPage');
  document.getElementById('backFromShop').onclick = () => showPage('mainPage');
  document.getElementById('backFromHelp').onclick = () => showPage('mainPage');
  document.getElementById('backFromGame').onclick = () => showPage('mainPage');
</script>
</body>
</html>
