<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>XXX 好玩生物 遊戲 Beta 1.1.0</title>

<style>

body{
    margin:0;
    background:#0f172a;
    font-family:Arial;
    color:white;
}

.topbar{
    background:#1e3a8a;
    padding:20px;
    text-align:center;
    font-size:40px;
    font-weight:bold;
}

.game{
    padding:20px;
}

.info{
    display:flex;
    gap:20px;
    justify-content:space-between;
    flex-wrap:wrap;
}

.card{
    background:#fef3c7;
    color:black;
    border-radius:20px;
    padding:20px;
    width:300px;
    font-size:24px;
    font-weight:bold;
}

.hpbar{
    width:100%;
    height:20px;
    background:#444;
    border-radius:20px;
    overflow:hidden;
    margin-top:10px;
}

.hpfill{
    height:100%;
    background:#ef4444;
    transition:0.3s;
}

.expfill{
    height:100%;
    background:#3b82f6;
    transition:0.3s;
}

.battle{
    margin-top:20px;
    height:300px;
    background:linear-gradient(#60a5fa,#4ade80);
    border-radius:20px;
    position:relative;
}

.enemy{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    font-size:120px;
    transition:0.2s;
}

.hit{
    transform:translate(-50%,-50%) scale(1.2);
}

.log{
    margin-top:20px;
    background:#fef3c7;
    color:black;
    padding:15px;
    border-radius:15px;
    font-size:20px;
    font-weight:bold;
}

.buttons{
    margin-top:20px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

button{
    border:none;
    border-radius:15px;
    padding:20px;
    font-size:24px;
    font-weight:bold;
    cursor:pointer;
    color:white;
}

.attack{ background:#dc2626; }
.skill{ background:#2563eb; }
.rest{ background:#16a34a; }
.save{ background:#d97706; }

button:active{
    transform:scale(0.95);
}

</style>
</head>

<body>

<div class="topbar">
XXX 好玩生物 遊戲 Beta 1.1.0
</div>

<div class="game">

<div class="info">

<div class="card">
👾 史萊姆 Lv.1
<div class="hpbar">
<div class="hpfill" id="enemyBar" style="width:100%"></div>
</div>
<div id="enemyHpText">35 / 35</div>
</div>

<div class="card">
🧑 玩家 Lv.<span id="level">1</span>

<div class="hpbar">
<div class="hpfill" id="playerBar" style="width:100%"></div>
</div>
<div id="playerHpText">100 / 100</div>

<div style="margin-top:10px;">EXP</div>
<div class="hpbar">
<div class="expfill" id="expBar" style="width:0%"></div>
</div>
<div id="expText">0 / 50</div>

</div>

</div>

<div class="battle">
<div class="enemy">🟣</div>
</div>

<div class="log" id="log">遇到了史萊姆！</div>

<div class="buttons">

<button class="attack" onclick="attack()">⚔️ 攻擊</button>
<button class="skill" onclick="skill()">🔥 技能</button>
<button class="rest" onclick="rest()">😴 休息</button>
<button class="save" onclick="saveGame()">💾 儲存</button>

</div>

</div>

<script>

let playerHp=100,maxHp=100;
let enemyHp=35,enemyMaxHp=35;
let level=1,exp=0;
let canClick=true;

function enemyHitEffect(){
let e=document.querySelector(".enemy");
e.classList.add("hit");
setTimeout(()=>e.classList.remove("hit"),200);
}

function updateUI(){
document.getElementById("playerHpText").innerText=
playerHp+" / "+maxHp;

document.getElementById("enemyHpText").innerText=
enemyHp+" / "+enemyMaxHp;

document.getElementById("level").innerText=level;

document.getElementById("expText").innerText=
exp+" / 50";

document.getElementById("playerBar").style.width=
(playerHp/maxHp*100)+"%";

document.getElementById("enemyBar").style.width=
(enemyHp/enemyMaxHp*100)+"%";

document.getElementById("expBar").style.width=
(exp/50*100)+"%";
}

function attack(){
if(!canClick)return;
canClick=false;

enemyHitEffect();

let dmg=Math.floor(Math.random()*15)+5;
enemyHp-=dmg;

document.getElementById("log").innerText="⚔️ 造成 "+dmg+" 傷害";

setTimeout(()=>{

if(enemyHp<=0){
enemyHp=0;
exp+=10;
document.getElementById("log").innerText="🎉 擊敗史萊姆";

enemyHp=enemyMaxHp;

if(exp>=50){
level++;
exp=0;
maxHp+=20;
playerHp=maxHp;
alert("升級！");
}
}else{
let d=Math.floor(Math.random()*10)+3;
playerHp-=d;
document.getElementById("log").innerText+=" / 反擊 "+d;

if(playerHp<=0){
alert("遊戲結束");
playerHp=maxHp;
enemyHp=enemyMaxHp;
exp=0;
level=1;
}
}

updateUI();
canClick=true;

},400);

updateUI();
}

function skill(){
if(!canClick)return;
canClick=false;

enemyHitEffect();

let dmg=Math.floor(Math.random()*25)+15;
enemyHp-=dmg;

document.getElementById("log").innerText="🔥 技能 "+dmg;

setTimeout(()=>{
canClick=true;
updateUI();
},300);

updateUI();
}

function rest(){
playerHp+=20;
if(playerHp>maxHp)playerHp=maxHp;
document.getElementById("log").innerText="😴 回復HP";
updateUI();
}

function saveGame(){
let data={playerHp,maxHp,enemyHp,level,exp};
localStorage.setItem("save",JSON.stringify(data));
document.getElementById("log").innerText="💾 已儲存";
}

updateUI();

</script>

</body>
</html>
