<html lang="zh-TW">
<head>

<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none}
body{background:radial-gradient(circle at 20% 30%,#1a2a3a,#0a0f1e);font-family:system-ui;min-height:100vh;display:flex;justify-content:center;align-items:center;color:#fff;padding:16px}
.app{width:100%;max-width:550px;background:rgba(255,255,255,0.08);backdrop-filter:blur(25px);border-radius:48px;padding:24px 20px 32px;border:1px solid rgba(255,255,255,0.2)}
.page{display:none}.page.active{display:block}
.main-title{font-size:2rem;font-weight:700;background:linear-gradient(135deg,#facc15,#ff8c00);-webkit-background-clip:text;background-clip:text;color:transparent;text-align:center;margin:20px 0 5px}
.author{text-align:center;font-size:0.7rem;color:#94a3b8;margin-bottom:16px}
.play-btn,.settings-btn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);border-radius:40px;padding:12px;font-size:1.1rem;font-weight:bold;cursor:pointer;width:80%;margin:10px auto;display:block;text-align:center;color:#fff}
.play-btn{background:#facc15;color:#0f172a;border:none}
button:active{transform:scale(0.97)}
.footer{text-align:center;font-size:0.65rem;color:#475569;margin-top:20px}
.back-btn{background:none;border:none;color:#3b82f6;font-size:1rem;cursor:pointer;margin-bottom:16px}
.setting-item{background:rgba(255,255,255,0.05);border-radius:28px;padding:12px 20px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.help-content{background:rgba(255,255,255,0.05);border-radius:28px;padding:20px;line-height:2}
.stats-line{display:flex;justify-content:space-between;margin:12px 0;font-weight:bold}
.bar{background:#1e293b;border-radius:20px;height:18px;overflow:hidden;margin:8px 0}
.fillhp{background:#ef4444;height:100%}.fillexp{background:#3b82f6;height:100%}
.enemy-icon{font-size:56px;margin:12px;text-align:center}
.log{background:rgba(0,0,0,0.5);border-radius:24px;padding:12px;margin:16px 0;font-size:0.85rem;color:#facc15;min-height:70px}
.buttons{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:16px}
.game-action{padding:10px 18px;border-radius:40px;font-weight:bold;border:none;background:#334155;color:#fff;cursor:pointer}
.attack{background:#dc2626}.skill{background:#8b5cf6}.rest{background:#16a34a}.save{background:#9333ea}.inventory{background:#eab308;color:#0f172a}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:#facc15;padding:8px 20px;border-radius:40px;font-size:0.8rem;z-index:999;animation:fadeOut 2s forwards}
@keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0;visibility:hidden}}
.switch{position:relative;display:inline-block;width:52px;height:28px}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#475569;border-radius:34px}
.slider:before{position:absolute;content:"";height:22px;width:22px;left:3px;bottom:3px;background:#fff;border-radius:50%}
input:checked+.slider{background:#3b82f6}
input:checked+.slider:before{transform:translateX(24px)}
input[type="range"]{width:140px;height:4px;-webkit-appearance:none;background:#475569;border-radius:2px}
input[type="range"]::-webkit-slider-thumb{width:16px;height:16px;border-radius:50%;background:#3b82f6;-webkit-appearance:none}
.difficulty-select{background:#0f172a;color:#fff;border:1px solid #475569;border-radius:20px;padding:6px 12px}
.guide-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:1000;display:flex;justify-content:center;align-items:center}
.guide-card{background:#1e293b;max-width:300px;padding:24px;border-radius:32px;text-align:center;border:1px solid #facc15}
.guide-card button{margin-top:16px;background:#facc15;border:none;padding:8px 20px;border-radius:40px;cursor:pointer;font-weight:bold}
.skill-menu-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:2000;display:flex;justify-content:center;align-items:center}
.skill-menu-card{background:#1e293b;width:260px;border-radius:32px;padding:16px;border:1px solid #facc15;text-align:center}
.skill-menu-card button{display:block;width:100%;margin:8px 0;padding:10px;border-radius:40px;background:#334155;color:#fff;border:none;cursor:pointer;font-weight:bold}
.backpack-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);z-index:3000;display:flex;justify-content:center;align-items:center}
.backpack-card{background:#1e293b;width:90%;max-width:320px;max-height:70%;border-radius:40px;padding:20px;border:1px solid #facc15;overflow-y:auto}
.backpack-item{background:#0f172a;border-radius:32px;padding:10px 14px;margin:10px 0;display:flex;justify-content:space-between;align-items:center;border-left:5px solid}
.backpack-item button{background:#facc15;color:#0f172a;padding:4px 12px;border-radius:30px;cursor:pointer;font-weight:bold}
.close-backpack{background:#ef4444;color:white;padding:6px 16px;border-radius:40px;margin-top:16px;cursor:pointer;font-weight:bold}
.flash{animation:flashAnim 0.2s}
@keyframes flashAnim{0%{background:#fff8}100%{background:0 0}}
.shake{animation:shakeAnim 0.1s 2}
@keyframes shakeAnim{0%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}100%{transform:translateX(0)}}
</style>
</head>
<body>
<div class="app">
  <div id="mainPage" class="page active">
    <div class="main-title">MONSTER GAME</div>

    <button class="play-btn" id="toGameBtn">▶ 開始遊戲</button>

  <div id="settingsPage" class="page"><div><button class="back-btn" id="backFromSettings">← 返回</button><span style="font-size:1.3rem;">設定</span></div><div id="settingsList"></div></div>
  <div id="shopPage" class="page"><div><button class="back-btn" id="backFromShop">← 返回</button><span style="font-size:1.3rem;">商店</span></div><div style="padding:16px;text-align:center"><div id="dailyRewardStatus" style="background:rgba(255,255,255,0.1);border-radius:40px;padding:12px;margin-bottom:20px">⭐ 每日獎勵</div><button id="claimDailyBtn" class="play-btn" style="width:auto;padding:8px 16px">🎁 領取</button></div></div>
  <div id="helpPage" class="page"><div><button class="back-btn" id="backFromHelp">← 返回</button><span style="font-size:1.3rem;">幫助</span></div><div class="help-content"><p>⚔️攻擊｜✨技能四選一｜😴休息(每場1次)</p><p>🎒背包：裝備穿脫｜📈50經驗升級｜💀Boss每10級出現</p><p>⚡套裝效果(2件同類)｜☁️Google登入雲端｜🏆成就自動記錄</p></div></div>
  <div id="gamePage" class="page">
    <button class="back-btn" id="backFromGame">← 主選單</button>
    <div class="stats-line"><span>❤️ <span id="hpText">100/100</span></span><span>⭐ <span id="expText">0/50</span></span><span>⬆️ Lv <span id="levelText">1</span></span></div>
    <div class="bar"><div class="fillhp" id="hpBar"></div></div><div class="bar"><div class="fillexp" id="expBar"></div></div>
    <div class="stats-line"><span>⚔️ <span id="atkText">10</span></span><span>🗺️ <span id="zoneText">新手村</span></span></div>
    <h3 id="monsterName">史萊姆</h3><div class="enemy-icon" id="monsterEmoji">🟣</div>
    <div>💀 HP <span id="monsterHpText">0/0</span> | ⭐ Lv <span id="monsterLevelText">0</span></div>
    <div class="bar"><div class="fillhp" id="monsterBar"></div></div>
    <div class="log" id="logMsg">點擊攻擊開始</div>
    <div class="buttons">
      <button class="game-action attack" id="attackBtn">⚔️</button>
      <button class="game-action skill" id="skillBtn">✨</button>
      <button class="game-action rest" id="restBtn">😴</button>
      <button class="game-action inventory" id="inventoryBtn">🎒</button>
      <button class="game-action save" id="saveBtn">💾</button>
    </div>
  </div>
</div>
<div id="guideOverlay" class="guide-overlay" style="display:none"><div class="guide-card"><p>🎮 歡迎！</p><p>⚔️攻擊 ✨技能 🎒裝備 😴休息</p><p>💀Boss每10級出現｜💾自動存檔</p><button id="closeGuideBtn">開始</button></div></div>
<script>
// ========== 版本號（集中管理）==========
const APP_VERSION = 'v3.2.0';
const APP_TAG = '706莊';

// ========== 版本更新檢查函數 ==========
function checkForUpdate(showToastIfSame = true) {
  const stored = localStorage.getItem('app_version');
  if (stored !== APP_VERSION) {
    // 顯示更新彈窗
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); backdrop-filter:blur(12px); display:flex; justify-content:center; align-items:center; z-index:10000;';
    const card = document.createElement('div');
    card.style.cssText = 'background:rgba(30,30,35,0.9); border-radius:32px; padding:24px; width:280px; text-align:center; color:white; border:1px solid rgba(255,255,255,0.2);';
    card.innerHTML = `<div style="font-size:48px;">✨</div><h3>發現新版本</h3><p>遊戲已更新至 ${APP_VERSION}</p><button id="updateNowBtn" style="background:#facc15; color:#0f172a; border:none; padding:10px 20px; border-radius:40px; margin-top:16px; cursor:pointer;">立即更新</button>`;
    overlay.appendChild(card);
    document.body.appendChild(overlay);
    document.getElementById('updateNowBtn').onclick = () => {
      localStorage.setItem('app_version', APP_VERSION);
      window.location.reload();
    };
  } else if (showToastIfSame) {
    toast(`已經是最新版本 ${APP_VERSION}`, false);
  }
}

// 初始自動檢查（僅當版本不一致時彈窗）
if(localStorage.getItem('app_version') !== APP_VERSION){
  checkForUpdate(false);
}

// ========== 工具 ==========
function toast(m,e){let d=document.createElement('div');d.className='toast';d.innerText=m;d.style.color=e?'#ff8888':'#facc15';document.body.appendChild(d);setTimeout(()=>d.remove(),2000);}
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
// ========== 音效 ==========
let actx=null,sfxOn=true,mgain=null;
function initAudio(){if(actx)return;actx=new AudioContext();mgain=actx.createGain();mgain.gain.value=localStorage.volume?parseFloat(localStorage.volume):0.7;mgain.connect(actx.destination);let buf=actx.createBuffer(1,1,22050),src=actx.createBufferSource();src.buffer=buf;src.connect(mgain);src.start();if(actx.state==='suspended')actx.resume();}
function tone(f,d,t,v){if(!sfxOn)return;initAudio();if(!actx||!mgain)return;if(actx.state==='suspended')actx.resume();let o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(mgain);o.frequency.value=f;o.type=t||'sine';g.gain.value=v||0.2;o.start();g.gain.exponentialRampToValueAtTime(0.00001,actx.currentTime+d);o.stop(actx.currentTime+d);}
const atkSound=()=>tone(523,0.12,'triangle',0.15);
const skillSound=()=>tone(880,0.18,'square',0.2);
const hurtSound=()=>tone(220,0.25,'sawtooth',0.2);
const lvUpSound=()=>{if(!sfxOn)return;tone(523,0.12);setTimeout(()=>tone(659,0.12),130);setTimeout(()=>tone(784,0.25),260);};
const defeatSound=()=>{tone(392,0.15);setTimeout(()=>tone(523,0.25),160);};
const bossSound=()=>{tone(110,0.5,'sawtooth',0.3);setTimeout(()=>tone(82,0.8,'sawtooth',0.3),400);};
window.setVol=v=>{if(mgain)mgain.gain.value=v;localStorage.volume=v;};
window.setSfx=e=>{sfxOn=e;localStorage.setItem('mute',e?'0':'1');};
const flash=()=>{document.body.classList.add('flash');setTimeout(()=>document.body.classList.remove('flash'),200);};
const shake=()=>{document.querySelector('.app').classList.add('shake');setTimeout(()=>document.querySelector('.app').classList.remove('shake'),200);};
// ========== 裝備 ==========
const Q=[{n:'普通',c:'#9ca3af',min:1,max:3,rate:0.5},{n:'優秀',c:'#4ade80',min:4,max:6,rate:0.3},{n:'稀有',c:'#3b82f6',min:7,max:10,rate:0.15},{n:'史詩',c:'#a855f7',min:11,max:15,rate:0.05}];
function rq(){let r=Math.random(),a=0;for(let q of Q)if((a+=q.rate)>r)return q;return Q[0];}
function genEq(){let t=rand(0,1)?'w':'a',q=rq(),b=rand(q.min,q.max);return{id:Date.now()+'-'+Math.random(),type:t,quality:q.n,color:q.c,bonus:b,name:`${q.n} ${t==='w'?'武':'防'}`,eq:false};}
function calcEq(eq){let a=0,h=0;eq.forEach(e=>{if(e.eq)e.type==='w'?a+=e.bonus:h+=e.bonus;});return{atk:a,hp:h};}
function setBonus(eq){let w=eq.filter(e=>e.type==='w'&&e.eq).length,a=eq.filter(e=>e.type==='a'&&e.eq).length;return{atk:w>=2?0.05:0,hp:a>=2?0.05:0};}
function applyEq(){let b=calcEq(window.eq),s=setBonus(window.eq);window.atk=Math.floor(window.bAtk+b.atk*(1+s.atk));window.maxHp=Math.floor(window.bHp+b.hp*(1+s.hp));if(window.hp>window.maxHp)window.hp=window.maxHp;upUI();}
function showBag(){
  let ov=document.createElement('div');ov.className='backpack-overlay';
  let cd=document.createElement('div');cd.className='backpack-card';cd.innerHTML='<h3>🎒 背包</h3>';
  if(window.eq.length===0)cd.innerHTML+='<p>無裝備</p>';
  else window.eq.forEach(e=>{
    let d=document.createElement('div');d.className='backpack-item';d.style.borderLeftColor=e.color;
    d.innerHTML=`<span style="color:${e.color}">${e.name}+${e.bonus}</span><button data-id="${e.id}">${e.eq?'卸下':'裝'}</button>`;
    d.querySelector('button').onclick=()=>{toggleEq(e.id);ov.remove();showBag();};
    cd.appendChild(d);
  });
  let cls=document.createElement('button');cls.innerText='關閉';cls.className='close-backpack';cls.onclick=()=>ov.remove();
  cd.appendChild(cls);ov.appendChild(cd);document.body.appendChild(ov);
}
window.toggleEq=(id)=>{
  let it=window.eq.find(e=>e.id==id);if(!it)return;
  if(it.eq){it.eq=false;toast(`卸下 ${it.name}`);}
  else{let same=window.eq.find(e=>e.type===it.type&&e.eq);if(same)same.eq=false;it.eq=true;toast(`裝備 ${it.name}`);}
  applyEq();save();showBag();
};
// ========== 狀態 ==========
window.hp=100;window.maxHp=100;window.exp=0;window.lv=1;window.atk=10;window.rest=false;
window.bAtk=10;window.bHp=100;window.eq=[];
window.totalKills=0;window.maxDmg=0;window.maxLv=1;window.ds=0;window.lastDmg=0;
window.diff=localStorage.diff||'normal';
const zones=[{n:"🌳新手村",maxLv:30,m:["🟣史萊姆","🟢哥布林","🐺森林狼","🦇蝙蝠","🌿樹精"]},{n:"🏜️沙漠",maxLv:90,m:["🦂巨蠍","🧻木乃伊","🐍沙蛇","🦅沙鷹","🏺詛咒陶罐"]},{n:"⛰️蒼穹",maxLv:100,m:["🐉青龍","👼天使","😈惡魔","✨星辰之靈","🌙月獸"]}];
const mSkills=[{n:'毒擊',e:'🌿',m:1.2},{n:'砂塵',e:'🏜️',m:1.0},{n:'龍息',e:'🐉',m:1.5},{n:'閃電',e:'⚡',m:1.3},{n:'冰霜',e:'❄️',m:1.1},{n:'治癒',e:'💚',h:15}];
const isBoss=l=>l%10===0;
const bossN=["新手守護者","沙暴領主","蒼穹巨龍","深淵魔王","永凍冰凰","雷霆泰坦","暗影幽靈","黃金獅鷲","時間守護者","終焉之神"];
const getZone=()=>window.lv<=30?zones[0]:window.lv<=90?zones[1]:zones[2];
const getMult=()=>{
  switch(window.diff){
    case 'easy':return{hp:0.7,atk:0.7,exp:1.1,off:-2};
    case 'hard':return{hp:1.5,atk:1.3,exp:0.85,off:3};
    case 'extreme':return{hp:2.0,atk:1.6,exp:0.7,off:6};
    default:return{hp:1,atk:1,exp:1,off:0};
  }
};
function genM(){
  let isB=isBoss(window.lv);
  let emoji,name,skill;
  if(isB){emoji="👑";name=bossN[Math.floor((window.lv-1)/10)]||"上古Boss";skill=mSkills[Math.floor(Math.random()*mSkills.length)];}
  else{let z=getZone(),m=z.m,raw=m[Math.floor(Math.random()*m.length)];emoji=raw[0];name=raw.slice(1);skill=mSkills[Math.floor(Math.random()*mSkills.length)];}
  let mlt=getMult(),off=mlt.off;
  if(window.ds>=3&&window.diff!=='easy')off=Math.max(-5,off-Math.floor(window.ds/2));
  let mlv=Math.max(1,window.lv+off);
  if(isB)mlv=window.lv+2;
  let bhp=(30+mlv*2.5)*mlt.hp,batk=(5+Math.floor(mlv/2.5))*mlt.atk;
  if(isB){bhp*=2;batk*=1.5;}
  let varf=v=>Math.floor(v*(0.6+Math.random()*0.8));
  let expG=Math.max(1,Math.floor((12+mlv*0.8)*mlt.exp));
  if(isB)expG*=3;
  return{emoji,name,mlv,hp:varf(bhp),maxHp:varf(bhp),atk:varf(batk),exp:expG,skill,isBoss:isB};
}
function refM(){window.curM=genM();window.rest=false;upUI();log(`✨ ${window.curM.isBoss?'👑BOSS ':''}${window.curM.emoji}${window.curM.name} Lv.${window.curM.mlv} | HP${window.curM.hp} 攻${window.curM.atk}`);if(window.curM.isBoss)bossSound();}
function upUI(){
  document.getElementById('hpText').innerText=`${window.hp}/${window.maxHp}`;
  document.getElementById('expText').innerText=`${window.exp}/50`;
  document.getElementById('levelText').innerText=window.lv;
  document.getElementById('atkText').innerText=window.atk;
  document.getElementById('zoneText').innerHTML=getZone().n;
  if(window.curM){
    document.getElementById('monsterName').innerHTML=`${window.curM.emoji}${window.curM.name}`;
    document.getElementById('monsterEmoji').innerText=window.curM.emoji;
    document.getElementById('monsterHpText').innerText=`${window.curM.hp}/${window.curM.maxHp}`;
    document.getElementById('monsterLevelText').innerText=window.curM.mlv;
    document.getElementById('monsterBar').style.width=`${window.curM.hp/window.curM.maxHp*100}%`;
  }
  document.getElementById('hpBar').style.width=`${window.hp/window.maxHp*100}%`;
  document.getElementById('expBar').style.width=`${window.exp/50*100}%`;
  document.getElementById('restBtn').disabled=window.rest;
}
function log(m){document.getElementById('logMsg').innerHTML=m;}
// ========== 存檔 ==========
const firebaseConfig={apiKey:"AIzaSyDevirfNqjlg5hVkF6pgMMU9tfx7CDac4A",authDomain:"monster-game-f193f.firebaseapp.com",projectId:"monster-game-f193f",storageBucket:"monster-game-f193f.firebasestorage.app",messagingSenderId:"304101821779",appId:"1:304101821779:web:9b77e901083a7949f265a6"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth(),db=firebase.firestore(),prov=new firebase.auth.GoogleAuthProvider();
let curUser=null;
window.googleLogin=async()=>{try{let r=await auth.signInWithPopup(prov);curUser=r.user;let btn=document.getElementById('googleBtn');if(btn){btn.innerText=`👤 ${curUser.displayName}`;btn.disabled=true;}toast(`歡迎 ${curUser.displayName}`);await loadCloud();}catch(e){toast('登入失敗',1);}};
window.googleLogout=async()=>{await auth.signOut();curUser=null;let btn=document.getElementById('googleBtn');if(btn){btn.innerText='登入';btn.disabled=false;}toast('已登出');load();};
auth.onAuthStateChanged(u=>{curUser=u;let btn=document.getElementById('googleBtn');if(btn){if(u){btn.innerText=`👤 ${u.displayName}`;btn.disabled=true;}else{btn.innerText='登入';btn.disabled=false;}}});
function save(){
  const st={lv:window.lv,exp:window.exp,bAtk:window.bAtk,bHp:window.bHp,hp:window.hp,maxHp:window.maxHp,atk:window.atk,rest:window.rest,diff:window.diff,eq:window.eq,ds:window.ds,lastDmg:window.lastDmg,totalKills:window.totalKills,maxDmg:window.maxDmg,maxLv:window.maxLv};
  localStorage.setItem('gameSave',JSON.stringify(st));toast('💾 存檔');
  if(curUser)db.collection('players').doc(curUser.uid).set(st).catch(e=>toast('雲端失敗',1));
}
function load(){
  let raw=localStorage.getItem('gameSave');
  if(raw){
    try{
      let s=JSON.parse(raw);
      window.lv=s.lv??1;window.exp=s.exp??0;window.bAtk=s.bAtk??10;window.bHp=s.bHp??100;
      window.hp=s.hp??100;window.maxHp=s.maxHp??100;window.atk=s.atk??10;window.rest=s.rest??false;
      window.diff=s.diff??'normal';window.eq=Array.isArray(s.eq)?s.eq:[];
      window.ds=s.ds??0;window.lastDmg=s.lastDmg??0;
      window.totalKills=s.totalKills??0;window.maxDmg=s.maxDmg??0;window.maxLv=s.maxLv??1;
      let ds=document.getElementById('diffSelect');if(ds)ds.value=window.diff;
    }catch(e){}
  }
  applyEq();refM();upUI();
}
async function loadCloud(){if(!curUser)return;try{let d=await db.collection('players').doc(curUser.uid).get();if(d.exists){let s=d.data();window.lv=s.lv??1;window.exp=s.exp??0;window.bAtk=s.bAtk??10;window.bHp=s.bHp??100;window.hp=s.hp??100;window.maxHp=s.maxHp??100;window.atk=s.atk??10;window.rest=s.rest??false;window.diff=s.diff??'normal';window.eq=Array.isArray(s.eq)?s.eq:[];window.ds=s.ds??0;window.lastDmg=s.lastDmg??0;window.totalKills=s.totalKills??0;window.maxDmg=s.maxDmg??0;window.maxLv=s.maxLv??1;applyEq();refM();upUI();toast('☁️ 同步');}else load();}catch(e){toast('雲端失敗',1);load();}}
// ========== 戰鬥 ==========
function lvUp(){
  let up=false;
  while(window.exp>=50){
    window.exp-=50;window.lv++;window.bHp+=20;window.bAtk+=5;
    let bonus=calcEq(window.eq);
    window.hp=Math.floor((window.bHp+bonus.hp)*0.7);
    up=true;
    log(`🎉 升 Lv${window.lv} 攻${window.bAtk+bonus.atk}`);
    if(window.lv>window.maxLv)window.maxLv=window.lv;
    lvUpSound();
  }
  if(up)refM();
  applyEq();save();
}
function mSkillAtk(){
  if(!window.curM?.skill)return;
  let s=window.curM.skill;
  if(s.n==='治癒'&&s.h){
    let heal=Math.floor(window.curM.maxHp*0.15);
    window.curM.hp=Math.min(window.curM.maxHp,window.curM.hp+heal);
    log(`💚 ${window.curM.emoji}${window.curM.name} 治療 ${heal}HP`);
    upUI();return;
  }
  let bd=Math.max(1,rand(window.curM.atk-2,window.curM.atk+2));
  let dmg=Math.floor(bd*(s.m||1));
  window.hp=Math.max(0,window.hp-dmg);
  log(`💀 ${window.curM.emoji}${window.curM.name} ${s.e}${s.n} ${dmg}傷`);
  if(window.hp<=0){window.hp=window.maxHp;window.rest=false;window.ds++;log(`💀 復活`);}
  upUI();save();
}
function mCounter(){
  if(!window.curM)return;
  let d=Math.max(1,rand(window.curM.atk-3,window.curM.atk+2));
  window.hp-=d;
  log(`😈 ${window.curM.emoji}${window.curM.name} 反擊 ${d}`);
  if(window.hp<=0){window.hp=window.maxHp;window.rest=false;window.ds++;log(`💀 復活`);}
  else window.ds=0;
  upUI();save();
  if(Math.random()<(window.curM.isBoss?0.7:0.4))mSkillAtk();
}
function defeatM(){
  if(!window.curM)return;
  window.exp+=window.curM.exp;
  log(`🎉 擊敗 ${window.curM.isBoss?'👑BOSS ':''}+${window.curM.exp}EXP`);
  window.totalKills++;
  if(window.lastDmg>window.maxDmg)window.maxDmg=window.lastDmg;
  if(Math.random()<0.3||window.curM.isBoss){
    let eq=genEq();
    if(window.curM.isBoss)eq.quality='史詩';
    window.eq.push(eq);
    toast(`🎁獲得 ${eq.name}+${eq.bonus}`);
    if(!window.eq.some(e=>e.type===eq.type&&e.eq)){eq.eq=true;applyEq();toast(`✨自動裝`);}
    save();
  }
  lvUp();refM();upUI();save();defeatSound();
}
function atk(){
  initAudio();atkSound();flash();shake();
  if(window.hp<=0){log('無法攻擊');return;}
  let d=Math.max(2,rand(window.atk-3,window.atk+5));
  window.lastDmg=d;
  window.curM.hp-=d;
  log(`⚔️ ${d}傷`);
  if(window.curM.hp<=0)defeatM();else mCounter();
  upUI();save();
}
const skillList=[
  {n:'火焰拳',dmg:a=>rand(a+8,a*2+5),e:'🔥'},
  {n:'水槍',dmg:a=>rand(a+5,a*2+2),e:'💧'},
  {n:'雷電',dmg:a=>rand(a+10,a*2+8),e:'⚡'},
  {n:'治癒',heal:30,e:'💚'}
];
function showSkill(){
  let ov=document.createElement('div');ov.className='skill-menu-overlay';
  let cd=document.createElement('div');cd.className='skill-menu-card';cd.innerHTML='<h3>選技能</h3>';
  skillList.forEach(s=>{
    let btn=document.createElement('button');
    btn.innerText=s.n==='治癒'?`${s.n} (恢復${s.heal}HP)`:s.n;
    btn.onclick=()=>{
      document.body.removeChild(ov);
      if(window.hp<=0){log('無法施放');return;}
      if(s.n==='治癒'){
        window.hp=Math.min(window.maxHp,window.hp+s.heal);
        log(`✨恢復${s.heal}HP`);
        upUI();save();
      }else{
        let d=s.dmg(window.atk);
        window.lastDmg=d;
        window.curM.hp-=d;
        log(`✨${s.e} ${d}傷`);
        if(window.curM.hp<=0)defeatM();else mCounter();
        upUI();save();
      }
      skillSound();flash();shake();
    };
    cd.appendChild(btn);
  });
  let cancel=document.createElement('button');cancel.innerText='取消';cancel.onclick=()=>document.body.removeChild(ov);
  cd.appendChild(cancel);ov.appendChild(cd);document.body.appendChild(ov);
}
function restAct(){
  initAudio();
  if(window.rest){log('已休息過');return;}
  if(window.hp<=0){log('無法休息');return;}
  window.hp=Math.min(window.maxHp,window.hp+30);
  window.rest=true;
  log(`😴恢復30HP`);
  let sneak=Math.max(1,rand(window.curM.atk-2,window.curM.atk+1));
  window.hp=Math.max(0,window.hp-sneak);
  log(`⚠️偷襲-${sneak}`);
  if(window.hp<=0){window.hp=window.maxHp;window.rest=false;log('💀復活');}
  upUI();save();hurtSound();
}
// ========== 每日 ==========
function canDaily(){let last=localStorage.getItem('lastDaily');return last!==new Date().toDateString();}
function claimDaily(){
  if(!canDaily()){toast('今日已領');return false;}
  let r=rand(1,3);
  if(r===1){window.exp+=20;toast('🎁20經驗');lvUp();}
  else if(r===2){
    let eq=genEq();
    window.eq.push(eq);
    toast(`🎁獲得 ${eq.name}+${eq.bonus}`);
    if(!window.eq.some(e=>e.type===eq.type&&e.eq)){eq.eq=true;applyEq();toast('✨自動裝');}
    upUI();
  }else{
    window.hp=Math.min(window.maxHp,window.hp+50);
    toast('🎁50HP藥水');
    upUI();
  }
  localStorage.setItem('lastDaily',new Date().toDateString());
  save();
  return true;
}
// ========== UI設定（包含版本顯示和檢查更新按鈕）==========
window.renderSet=()=>{
  let c=document.getElementById('settingsList');if(!c)return;
  let vol=Math.round((localStorage.volume?parseFloat(localStorage.volume):0.7)*100);
  let diff=window.diff,isMuted=localStorage.mute==='1';
  c.innerHTML=`
    <div class="setting-item"><div>🔊音量</div><input type="range" id="volSlider" min="0" max="100" value="${vol}"></div>
    <div class="setting-item"><div>🔔音效</div><label class="switch"><input type="checkbox" id="sfxCk" ${!isMuted?'checked':''}><span class="slider"></span></label></div>
    <div class="setting-item"><div>⚔️難度</div><select id="diffSelect"><option value="easy" ${diff==='easy'?'selected':''}>簡單</option><option value="normal" ${diff==='normal'?'selected':''}>普通</option><option value="hard" ${diff==='hard'?'selected':''}>困難</option><option value="extreme" ${diff==='extreme'?'selected':''}>極限</option></select></div>
    <div class="setting-item"><div>🔐Google</div><div><button id="googleBtn" style="background:#334155;padding:6px 12px;">登入</button> <button id="logoutBtn" style="background:#334155;padding:6px 12px;">登出</button></div></div>
    <div class="setting-item"><div>🏆成就</div><div>🐉${window.totalKills} 💥${window.maxDmg} 🏆${window.maxLv}</div></div>
    <div class="setting-item"><div>📌 版本</div><div>${APP_VERSION} | ${APP_TAG}</div></div>
    <div class="setting-item"><div>🔄 檢查更新</div><button id="checkUpdateBtn" style="background:#3b82f6; color:white; border:none; padding:6px 12px; border-radius:30px; cursor:pointer;">檢查</button></div>
    <div class="setting-item"><div style="color:#f87171;">⚠️重置遊戲</div><button id="resetGameBtn" style="background:#ef4444; color:white; border:none; padding:6px 12px; border-radius:30px; cursor:pointer;">重置</button></div>`;
  document.getElementById('volSlider')?.addEventListener('input',e=>{let v=e.target.value/100;if(window.setVol)window.setVol(v);});
  document.getElementById('sfxCk')?.addEventListener('change',e=>{if(window.setSfx)window.setSfx(e.target.checked);localStorage.setItem('mute',e.target.checked?'0':'1');});
  document.getElementById('diffSelect')?.addEventListener('change',e=>{window.diff=e.target.value;localStorage.setItem('diff',window.diff);refM();toast(`難度:${window.diff}`);});
  document.getElementById('googleBtn')?.addEventListener('click',()=>window.googleLogin());
  document.getElementById('logoutBtn')?.addEventListener('click',()=>window.googleLogout());
  document.getElementById('checkUpdateBtn')?.addEventListener('click',()=>checkForUpdate(true));
  document.getElementById('resetGameBtn')?.addEventListener('click',()=>{
    if(confirm('⚠️ 確定要重置遊戲嗎？所有進度（等級、裝備、成就、雲端存檔）都會被清除！')) {
      localStorage.clear();
      if(window.googleLogout) window.googleLogout();
      alert('遊戲已重置，頁面將重新整理。');
      window.location.reload();
    }
  });
  if(curUser){let gb=document.getElementById('googleBtn');if(gb){gb.innerText=`👤 ${curUser.displayName}`;gb.disabled=true;}}
};
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id)?.classList.add('active');
  if(id==='settingsPage')window.renderSet();
  if(id==='shopPage'){
    let sd=document.getElementById('dailyRewardStatus');
    if(sd)sd.innerHTML=canDaily()?'⭐可領取':'✅已領';
    document.getElementById('claimDailyBtn').onclick=()=>{claimDaily();if(sd)sd.innerHTML=canDaily()?'⭐可領取':'✅已領';};
  }
}
document.getElementById('toGameBtn').onclick=()=>showPage('gamePage');
document.getElementById('toSettingsBtn').onclick=()=>showPage('settingsPage');
document.getElementById('shopBtn').onclick=()=>showPage('shopPage');
document.getElementById('helpBtn').onclick=()=>showPage('helpPage');
document.getElementById('backFromSettings').onclick=()=>showPage('mainPage');
document.getElementById('backFromShop').onclick=()=>showPage('mainPage');
document.getElementById('backFromHelp').onclick=()=>showPage('mainPage');
document.getElementById('backFromGame').onclick=()=>showPage('mainPage');
document.getElementById('attackBtn').onclick=atk;
document.getElementById('skillBtn').onclick=showSkill;
document.getElementById('restBtn').onclick=restAct;
document.getElementById('inventoryBtn').onclick=showBag;
document.getElementById('saveBtn').onclick=save;
load();
if(!localStorage.getItem('guideShown')){
  let ov=document.getElementById('guideOverlay');
  ov.style.display='flex';
  document.getElementById('closeGuideBtn').onclick=()=>{ov.style.display='none';localStorage.setItem('guideShown','true');};
}
</script>
</body>
</html>
