<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>幻獸鬥士 Beta 1.3.0</title>
<style>
    * {
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        box-sizing: border-box;
    }
    body {
        margin: 0;
        background: linear-gradient(135deg, #0b1120, #0f172a);
        color: #f1f5f9;
        font-family: 'Segoe UI', system-ui, Arial, sans-serif;
        text-align: center;
        padding-bottom: 30px;
    }
    .topbar {
        background: rgba(30,58,138,0.9);
        backdrop-filter: blur(8px);
        padding: 12px 16px;
        font-size: 1.3rem;
        font-weight: bold;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        border-bottom: 2px solid #facc15;
    }
    .version {
        background: #334155;
        padding: 4px 10px;
        border-radius: 30px;
        font-size: 0.7rem;
    }
    .map-badge {
        background: #1e3a8a;
        padding: 4px 12px;
        border-radius: 30px;
        font-size: 0.8rem;
    }
    .info, .battle, .log {
        background: rgba(15,23,42,0.7);
        backdrop-filter: blur(4px);
        margin: 16px;
        padding: 16px;
        border-radius: 28px;
        border: 1px solid rgba(255,255,255,0.1);
    }
    .bar {
        width: 90%;
        height: 22px;
        background: #1e293b;
        border-radius: 40px;
        margin: 10px auto;
        overflow: hidden;
    }
    .fillhp { height: 100%; background: #ef4444; }
    .fillexp { height: 100%; background: #3b82f6; }
    .enemy {
        font-size: 64px;
        margin: 15px 0;
        filter: drop-shadow(0 8px 12px black);
    }
    .log {
        background: #1e293b;
        color: #facc15;
        font-weight: bold;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-left: 6px solid #facc15;
    }
    .buttons {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
        margin: 20px;
    }
    button {
        border: none;
        padding: 12px 20px;
        border-radius: 60px;
        font-size: 1.1rem;
        font-weight: bold;
        cursor: pointer;
        transition: transform 0.1s;
        min-width: 100px;
    }
    button:active { transform: scale(0.96); }
    .attack { background: #dc2626; color: white; }
    .skill { background: #2563eb; color: white; }
    .rest { background: #16a34a; color: white; }
    .save { background: #9333ea; color: white; }
    .stat-row {
        display: flex;
        justify-content: space-between;
        margin: 10px 8px;
        font-weight: bold;
        flex-wrap: wrap;
    }
    @media (max-width: 500px) {
        button { padding: 10px 16px; font-size: 0.9rem; min-width: 85px; }
        .topbar { font-size: 1rem; }
    }
</style>
</head>
<body>

<div class="topbar">
    <div>🐉 幻獸鬥士 <span class="version">Beta 1.3.0</span></div>
    <div class="map-badge" id="mapDisplay">🌳 新手村</div>
</div>

<div class="info">
    <div class="stat-row">
        <span>❤️ HP <span id="hpText">100/100</span></span>
        <span>⭐ EXP <span id="expText">0/50</span></span>
    </div>
    <div class="bar"><div class="fillhp" id="hpBar" style="width:100%"></div></div>
    <div class="bar"><div class="fillexp" id="expBar" style="width:0%"></div></div>
    <div class="stat-row">
        <span>⬆️ 等級 <strong id="levelText">1</strong></span>
        <span>⚔️ 攻擊力 <strong id="atkText">10</strong></span>
        <span>🗺️ 區域 <strong id="zoneText">新手村</strong></span>
    </div>
</div>

<div class="battle">
    <h2 id="monsterName">🟣 史萊姆</h2>
    <div class="enemy" id="monsterEmoji">🟣</div>
    <div>💀 HP <span id="monsterHpText">0/0</span></div>
    <div class="bar"><div class="fillhp" id="monsterBar" style="width:0%"></div></div>
    <div id="monsterAtkDisplay" style="font-size:0.8rem; margin-top:5px;">⚔️ 攻擊力: ?</div>
</div>

<div class="log" id="log">✨ 點擊攻擊或技能開始冒險！等級越高，區域會自動切換。</div>

<div class="buttons">
    <button class="attack" onclick="attack()">⚔️ 攻擊</button>
    <button class="skill" onclick="skill()">🔥 技能</button>
    <button class="rest" id="restBtn" onclick="rest()">😴 休息</button>
    <button class="save" onclick="saveGame()">💾 存檔</button>
</div>

<script src="sound.js"></script>
<script src="game.js"></script>
</body>
</html>
