<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MONSTER GAME</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;user-select:none;}
  body{background:radial-gradient(circle at 20% 30%,#1a2a3a,#0a0f1e);font-family:system-ui;min-height:100vh;display:flex;justify-content:center;align-items:center;color:#fff;}
  .app{width:100%;max-width:500px;margin:20px;background:rgba(255,255,255,0.08);backdrop-filter:blur(25px);border-radius:48px;padding:24px 20px 32px;border:1px solid rgba(255,255,255,0.2);}
  .page{display:none;}.page.active{display:block;}
  .main-title{font-size:2rem;font-weight:700;background:linear-gradient(135deg,#FFE6B0,#FFB347);-webkit-background-clip:text;background-clip:text;color:transparent;margin:30px 0;}
  .play-btn{background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);padding:14px 28px;border-radius:60px;font-size:1.3rem;font-weight:bold;cursor:pointer;margin:20px 0;width:70%;color:white;}
  .settings-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.2);color:#ddd;padding:8px 20px;border-radius:30px;cursor:pointer;}
  .setting-item{background:rgba(255,255,255,0.05);border-radius:28px;padding:14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
  .small-btn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.2);border-radius:30px;padding:6px 14px;color:white;font-size:0.75rem;cursor:pointer;}
  .difficulty-select{background:rgba(0,0,0,0.5);color:white;border:1px solid rgba(255,255,255,0.3);border-radius:20px;padding:6px 12px;}
  .switch{position:relative;display:inline-block;width:48px;height:24px;}
  .switch input{opacity:0;width:0;height:0;}
  .slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#475569;border-radius:24px;}
  .slider:before{position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background:white;border-radius:50%;transition:0.2s;}
  input:checked+.slider{background:#3b82f6;}
  input:checked+.slider:before{transform:translateX(24px);}
  input[type="range"]{width:140px;height:4px;-webkit-appearance:none;background:#475569;}
  input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#3b82f6;cursor:pointer;}
  .stat-row{display:flex;justify-content:space-between;margin:12px 0;font-weight:bold;}
  .bar{background:rgba(0,0,0,0.5);border-radius:20px;height:18px;overflow:hidden;margin:8px 0;}
  .fillhp{background:#ef4444;height:100%;}
  .fillexp{background:#3b82f6;height:100%;}
  .enemy-icon{font-size:56px;margin:12px;}
  .log{background:rgba(0,0,0,0.5);border-radius:28px;padding:12px;margin:16px 0;font-size:0.85rem;}
  .buttons{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-top:16px;}
  .game-action{padding:10px 20px;border-radius:40px;font-weight:bold;border:none;background:rgba(255,255,255,0.2);color:white;font-size:1.2rem;cursor:pointer;}
  .attack{background:#dc2626;}.skill{background:#2563eb;}.rest{background:#16a34a;}.save{background:#9333ea;}
  .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:#facc15;padding:8px 20px;border-radius:40px;font-size:0.8rem;z-index:999;animation:fadeOut 2s forwards;}
  @keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0;visibility:hidden}}
</style>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
</head>
<body>
<div class="app">
  <div id="mainPage" class="page active">
    <div class="main-title">MONSTER GAME</div>
    <button class="play-btn" id="toGameBtn">▶ PLAY GAME</button><br>
    <button class="settings-btn" id="toSettingsBtn">⚙ SETTINGS</button>
    <div style="margin-top:30px; font-size:0.7rem;">v2.0</div>
  </div>
  <div id="settingsPage" class="page">
    <button class="small-btn" id="backFromSettings" style="margin-bottom:12px;">← BACK</button>
    <div class="setting-item"><span>🔊 Volume</span><input type="range" id="volumeSlider" min="0" max="100" value="70"></div>
    <div class="setting-item"><span>🔔 SFX</span><label class="switch"><input type="checkbox" id="sfxToggle" checked><span class="slider"></span></label></div>
    <div class="setting-item"><span>⚔️ Difficulty</span><select id="difficultySelect"><option value="easy">Easy</option><option value="normal" selected>Normal</option><option value="hard">Hard</option></select></div>
    <div class="setting-item"><span>🔐 Google</span><button class="small-btn" id="googleLoginBtn">登入 Google</button><button class="small-btn" id="logoutBtn">登出</button></div>
  </div>
  <div id="gamePage" class="page">
    <button class="small-btn" id="backFromGame">← MENU</button>
    <div class="stat-row"><span>❤️</span> <span id="hpText">100/100</span><span>⭐</span> <span id="expText">0/50</span><span>⬆️ Lv</span> <span id="levelText">1</span></div>
    <div class="bar"><div class="fillhp" id="hpBar"></div></div>
    <div class="bar"><div class="fillexp" id="expBar"></div></div>
    <div class="stat-row"><span>⚔️</span> <span id="atkText">10</span><span>🗺️</span> <span id="zoneText">新手村</span></div>
    <h3 id="monsterName">史萊姆</h3>
    <div class="enemy-icon" id="monsterEmoji">🟣</div>
    <div>💀 HP <span id="monsterHpText">0/0</span></div>
    <div class="bar"><div class="fillhp" id="monsterBar"></div></div>
    <div class="log" id="logMsg">點擊攻擊開始</div>
    <div class="buttons">
      <button class="game-action attack" id="attackBtn">⚔️</button>
      <button class="game-action skill" id="skillBtn">🔥</button>
      <button class="game-action rest" id="restBtn">😴</button>
      <button class="game-action save" id="saveBtn">💾</button>
    </div>
  </div>
</div>
<script>
// ==================== Firebase 設定 ====================
const firebaseConfig = {
  apiKey: "AIzaSyDevirfNqjlg5hVkF6pgMMU9tfx7CDac4A",
  authDomain: "monster-game-f193f.firebaseapp.com",
  projectId: "monster-game-f193f",
  storageBucket: "monster-game-f193f.firebasestorage.app",
  messagingSenderId: "304101821779",
  appId: "1:304101821779:web:9b77e901083a7949f265a6"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

// ==================== 遊戲核心變數 ==================
let hp=100, maxHp=100, exp=0, level=1, atk=10, restUsed=false;
let curMonster = { name:"史萊姆", emoji:"🟣", hp:35, maxHp:35, atk:5, exp:15 };
let currentDifficulty = "normal";
let audioCtx=null, masterGain=null, sfxEnabled=true;

// ==================== 輔助函數 ==================
function toast(msg) { let d=document.createElement("div"); d.className="toast"; d.innerText=msg; document.body.appendChild(d); setTimeout(()=>d.remove(),2000); }
function saveLocal() { localStorage.setItem("gameSave", JSON.stringify({hp,maxHp,exp,level,atk,restUsed,currentDifficulty})); toast("💾 已存檔"); }
function loadLocal() {
  let d=localStorage.getItem("gameSave");
  if(d) { let s=JSON.parse(d); hp=s.hp; maxHp=s.maxHp; exp=s.exp; level=s.level; atk=s.atk; restUsed=s.restUsed; currentDifficulty=s.currentDifficulty; document.getElementById('difficultySelect').value=currentDifficulty; }
  refreshMonster(); updateUI();
}
function updateUI() {
  document.getElementById('hpText').innerText=`${hp}/${maxHp}`;
  document.getElementById('expText').innerText=`${exp}/50`;
  document.getElementById('levelText').innerText=level;
  document.getElementById('atkText').innerText=atk;
  document.getElementById('zoneText').innerHTML=level<=30?"🌳新手村":(level<=90?"🏜️沙漠":"⛰️蒼穹");
  document.getElementById('monsterName').innerHTML=curMonster.name;
  document.getElementById('monsterEmoji').innerText=curMonster.emoji;
  document.getElementById('monsterHpText').innerText=`${curMonster.hp}/${curMonster.maxHp}`;
  document.getElementById('hpBar').style.width=`${hp/maxHp*100}%`;
  document.getElementById('expBar').style.width=`${exp/50*100}%`;
  document.getElementById('monsterBar').style.width=`${curMonster.hp/curMonster.maxHp*100}%`;
  document.getElementById('restBtn').disabled=restUsed;
}
function logMsg(m){ document.getElementById('logMsg').innerHTML=m; }
function rand(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function getDifficultyMultiplier() {
  if(currentDifficulty=="easy") return { hp:0.7, atk:0.7 };
  if(currentDifficulty=="hard") return { hp:1.5, atk:1.3 };
  return { hp:1, atk:1 };
}
function genMonster() {
  let zone = level<=30 ? ["🟣史萊姆","🟢哥布林","🐺森林狼"] : (level<=90 ? ["🦂巨蠍","🧻木乃伊","🐍沙蛇"] : ["🐉青龍","👼天使","😈惡魔"]);
  let raw = zone[Math.floor(Math.random()*zone.length)];
  let emoji=raw[0], name=raw.slice(1);
  let mult = getDifficultyMultiplier();
  let baseHp = (30 + level*2.5)*mult.hp;
  let baseAtk = (5 + Math.floor(level/2.5))*mult.atk;
  let variance = v => Math.floor(v * (0.6 + Math.random()*0.8));
  let expGain = Math.floor(12 + level*0.8);
  return { name, emoji, hp:variance(baseHp), maxHp:variance(baseHp), atk:variance(baseAtk), exp:Math.max(1,expGain) };
}
function refreshMonster() { curMonster = genMonster(); restUsed=false; updateUI(); logMsg(`✨ ${curMonster.name} 出現 HP${curMonster.hp} 攻${curMonster.atk}`); }
function levelUp() {
  let up=false;
  while(exp>=50) { exp-=50; level++; maxHp+=20; atk+=5; hp=Math.floor(maxHp*0.7); up=true; logMsg(`🎉 升級 Lv${level} 攻擊力${atk}`); playLevelUp(); updateUI(); }
  if(up) refreshMonster();
}
function monsterAttack() {
  let dmg = Math.max(1, rand(curMonster.atk-3, curMonster.atk+2));
  hp -= dmg; playHurt(); logMsg(`😈 ${curMonster.name} 反擊 ${dmg}`);
  if(hp<=0) { hp=maxHp; restUsed=false; logMsg(`💀 復活`); }
  updateUI();
}
function defeat() {
  exp += curMonster.exp; logMsg(`🎉 擊敗 ${curMonster.name} 獲得 ${curMonster.exp} EXP`);
  playDefeat(); levelUp(); refreshMonster(); updateUI();
}
function attack() {
  initAudio(); playAttack(); if(hp<=0){ logMsg("無法攻擊"); return; }
  let dmg = Math.max(2, rand(atk-3, atk+5));
  curMonster.hp -= dmg; logMsg(`⚔️ 造成 ${dmg} 傷害`);
  if(curMonster.hp<=0) defeat(); else monsterAttack();
  updateUI();
}
function skill() {
  initAudio(); playSkill(); if(hp<=0){ logMsg("無法施放"); return; }
  let dmg = rand(atk+5, atk*2+3);
  curMonster.hp -= dmg; logMsg(`🔥 技能造成 ${dmg} 傷害`);
  if(curMonster.hp<=0) defeat(); else monsterAttack();
  updateUI();
}
function rest() {
  initAudio(); playRest(); if(restUsed){ logMsg("已休息過"); return; } if(hp<=0){ logMsg("無法休息"); return; }
  hp = Math.min(maxHp, hp+30); restUsed=true; logMsg(`😴 恢復30 HP`);
  let sneak = Math.max(1, rand(curMonster.atk-2, curMonster.atk+1));
  hp -= sneak; logMsg(`⚠️ 偷襲 -${sneak}`);
  if(hp<=0){ hp=maxHp; restUsed=false; logMsg(`💀 復活`); }
  updateUI();
}
// ==================== 音效 ==================
function initAudio() { if(audioCtx) return; audioCtx=new AudioContext(); masterGain=audioCtx.createGain(); masterGain.gain.value=document.getElementById('volumeSlider').value/100; masterGain.connect(audioCtx.destination); }
function playTone(f,d,t,v=0.2){ if(!sfxEnabled||!audioCtx||!masterGain) return; let o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.connect(g); g.connect(masterGain); o.frequency.value=f; o.type=t; g.gain.value=v; o.start(); g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime+d); o.stop(audioCtx.currentTime+d); }
function playAttack(){ playTone(523,0.12,"triangle",0.15); }
function playSkill(){ playTone(880,0.18,"square",0.2); }
function playHurt(){ playTone(220,0.25,"sawtooth",0.2); }
function playLevelUp(){ if(!sfxEnabled) return; playTone(523,0.12); setTimeout(()=>playTone(659,0.12),130); setTimeout(()=>playTone(784,0.25),260); }
function playDefeat(){ playTone(392,0.15); setTimeout(()=>playTone(523,0.25),160); }
function playRest(){ playTone(330,0.18); setTimeout(()=>playTone(262,0.22),180); }
document.getElementById("sfxToggle").onchange=e=>{ sfxEnabled=e.target.checked; };
document.getElementById("volumeSlider").oninput=e=>{ if(masterGain) masterGain.gain.value=e.target.value/100; };
// ==================== Google 登入（核心修復）==================
function updateGoogleButton() {
  const btn = document.getElementById("googleLoginBtn");
  const user = auth.currentUser;
  if (user) {
    btn.innerText = `👤 ${user.displayName}`;
    btn.onclick = null;
  } else {
    btn.innerText = "登入 Google";
    btn.onclick = () => auth.signInWithRedirect(provider);
  }
}
window.logout = () => auth.signOut().then(() => updateGoogleButton());
auth.onAuthStateChanged(user => { updateGoogleButton(); if(user) toast(`歡迎 ${user.displayName}`); });
updateGoogleButton(); // 初始執行
// ==================== 頁面切換與事件綁定 ==================
const mainDiv=document.getElementById('mainPage'), setDiv=document.getElementById('settingsPage'), gameDiv=document.getElementById('gamePage');
document.getElementById('toGameBtn').onclick=()=>{ mainDiv.classList.remove('active'); gameDiv.classList.add('active'); loadLocal(); };
document.getElementById('toSettingsBtn').onclick=()=>{ mainDiv.classList.remove('active'); setDiv.classList.add('active'); };
document.getElementById('backFromSettings').onclick=()=>{ setDiv.classList.remove('active'); mainDiv.classList.add('active'); };
document.getElementById('backFromGame').onclick=()=>{ gameDiv.classList.remove('active'); mainDiv.classList.add('active'); };
document.getElementById('difficultySelect').onchange=e=>{ currentDifficulty=e.target.value; refreshMonster(); };
document.getElementById('attackBtn').onclick=attack;
document.getElementById('skillBtn').onclick=skill;
document.getElementById('restBtn').onclick=rest;
document.getElementById('saveBtn').onclick=saveLocal;
document.getElementById('logoutBtn').onclick=logout;
refreshMonster(); updateUI();
</script>
</body>
</html>
