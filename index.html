<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monster Game</title>

<style>
body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:Arial;
    text-align:center;
}

button{
    padding:20px;
    font-size:20px;
    margin:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.attack{background:red;color:white;}
</style>
</head>

<body>

<h1>🎮 Monster Game Beta</h1>

<h2 id="log">遇到怪物！</h2>

<button class="attack" onclick="attack()">攻擊</button>

<script>

let hp = 30;

function attack(){
    let dmg = Math.floor(Math.random()*10)+5;
    hp -= dmg;

    document.getElementById("log").innerText =
    "造成 "+dmg+" 傷害，怪物HP："+hp;

    if(hp <= 0){
        document.getElementById("log").innerText = "勝利！怪物重生";
        hp = 30;
    }
}

</script>

</body>
</html>
