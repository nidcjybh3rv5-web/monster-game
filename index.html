<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monster Game Beta 1.1.0（隨機版）</title>

<style>
body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:Arial;
    text-align:center;
}

.topbar{
    background:#1e3a8a;
    padding:18px;
    font-size:28px;
    font-weight:bold;
}

.container{ padding:15px; }

.card{
    background:#fef3c7;
    color:black;
    border-radius:18px;
    padding:15px;
    margin-bottom:15px;
    font-weight:bold;
}

.bar{
    width:100%;
    height:22px;
    background:#444;
    border-radius:20px;
    overflow:hidden;
    margin-top:8px;
}

.hpfill{
    height:100%;
    background:#ef4444;
}

.expfill{
    height:100%;
    background:#3b82f6;
}

.battle{
    background:linear-gradient(#60a5fa,#4ade80);
    border-radius:20px;
    padding:35px;
    margin-bottom:15px;
}

.enemy{
    font-size:80px;
}

.enemyName{
    font-size:24px;
    font-weight:bold;
    margin-top:10px;
}

.log{
    background:#fef3c7;
    color:black;
    border-radius:15px;
    padding:15px;
    font-size:20px;
    font-weight:bold;
    margin-bottom:15px;
}

.buttons{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

button{
    border:none;
    border-radius:15px;
    padding:18px;
    font-size:20px;
    font-weight:bold;
    color:white;
    cursor:pointer;
}

.attack{background:#dc2626;}
.skill{background:#2563eb;}
.rest{background:#16a34a;}
.save{background:#9333ea;}
</style>
</head>

<body>

<div class="topbar">🎮 Monster Game Beta 1.1.0（隨機版）</div>

<div class="container">

<div class="card">
🧑 玩家 Lv.<span id="level">1</span>

<br><br>

❤️ HP：<span id="hpText"></span>
<div class="bar"><div class="hpfill" id="hpBar"></div></div>

<br>

⭐ EXP：<span id="expText"></span>
<div class="bar"><div class="expfill" id="expBar"></div></div>

<br>

⚔️ 攻擊力：<span id="atk"></span>
</div>

<div class="battle">

<div class="enemy" id="enemyEmoji">🟣</div>

<div class="enemyName" id="enemyName"></div>

<br>

❤️ HP：<span id="enemyHpText"></span>
<div class="bar"><div class="hpfill" id="enemyBar"></div></div>

</div>

<div class="log" id="log">遊戲開始！</div>

<div class="buttons">

<button class="attack" onclick="attack()">⚔️ 攻擊</button>
<button class="skill" onclick="skill()">🔥 技能</button>
<button class="rest" onclick="rest()">😴 休息</button>
<button class="save" onclick="saveGame()">💾 存檔</button>

</div>

</div>

<script>

let player = {
hp:100,
maxHp:100,
atk:10,
level:1,
exp:0
};

let enemies = [
{name:"史萊姆",emoji:"🟣",hp:35},
{name:"殭屍",emoji:"🧟",hp:60},
{name:"惡魔",emoji:"👹",hp:90},
{name:"巨龍",emoji:"🐉",hp:140}
];

// 🎲 隨機怪物
function getEnemy(){
return enemies[Math.floor(Math.random()*enemies.length)];
}

let enemy = getEnemy();
let enemyHp = enemy.hp;

function updateUI(){

document.getElementById("level").innerText = player.level;
document.getElementById("atk").innerText = player.atk;

document.getElementById("hpText").innerText =
player.hp + " / " + player.maxHp;

document.getElementById("expText").innerText =
player.exp + " / 50";

document.getElementById("enemyName").innerText =
enemy.name;

document.getElementById("enemyEmoji").innerText =
enemy.emoji;

document.getElementById("enemyHpText").innerText =
enemyHp + " / " + enemy.hp;

document.getElementById("hpBar").style.width =
(player.hp/player.maxHp*100) + "%";

document.getElementById("enemyBar").style.width =
(enemyHp/enemy.hp*100) + "%";

document.getElementById("expBar").style.width =
(player.exp/50*100) + "%";
}

function attack(){

let dmg = Math.floor(Math.random()*player.atk)+5;
enemyHp -= dmg;

document.getElementById("log").innerText =
"⚔️ 造成 "+dmg+" 傷害！";

enemyTurn();

}

function skill(){

let dmg = Math.floor(Math.random()*player.atk*2)+10;
enemyHp -= dmg;

document.getElementById("log").innerText =
"🔥 技能 "+dmg+" 傷害！";

enemyTurn();

}

function enemyTurn(){

if(enemyHp <= 0){

player.exp += 20;

document.getElementById("log").innerText =
"🎉 打敗 "+enemy.name;

if(player.exp >= 50){
player.exp = 0;
player.level++;
player.maxHp += 20;
player.hp = player.maxHp;
player.atk += 5;
alert("⬆️ 升級！");
}

// 🎲 換新隨機怪物
enemy = getEnemy();
enemyHp = enemy.hp;

updateUI();
return;
}

let dmg = Math.floor(Math.random()*10)+5;
player.hp -= dmg;

if(player.hp <= 0){
alert("💀 死亡重置");
player.hp = player.maxHp;
player.exp = 0;
player.level = 1;
player.atk = 10;
enemy = getEnemy();
enemyHp = enemy.hp;
}

updateUI();
}

function rest(){
player.hp += 30;
if(player.hp > player.maxHp) player.hp = player.maxHp;
document.getElementById("log").innerText = "😴 回復HP +30";
updateUI();
}

function saveGame(){
localStorage.setItem("save", JSON.stringify(player));
document.getElementById("log").innerText = "💾 已存檔";
}

function loadGame(){
let data = localStorage.getItem("save");
if(data){
player = JSON.parse(data);
document.getElementById("log").innerText = "📂 已讀檔";
}
}

loadGame();
updateUI();

</script>

</body>
</html>
