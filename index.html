<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>幻獸鬥士</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;user-select:none;}
  body{background:radial-gradient(circle at 20% 30%,#1a2a3a,#0a0f1e);font-family:system-ui,-apple-system,"Segoe UI Emoji","Apple Color Emoji","Noto Color Emoji",sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;color:#fff;padding:16px;}
  .app{width:100%;max-width:550px;background:rgba(255,255,255,0.08);backdrop-filter:blur(25px);border-radius:48px;padding:24px 20px 32px;border:1px solid rgba(255,255,255,0.2);}
  .page{display:none;}.page.active{display:block;}
  .main-title{font-size:2rem;font-weight:700;background:linear-gradient(135deg,#facc15,#ff8c00);-webkit-background-clip:text;background-clip:text;color:transparent;text-align:center;margin:20px 0;}
  .play-btn,.settings-btn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);border-radius:40px;padding:12px;font-size:1.1rem;font-weight:bold;cursor:pointer;width:80%;margin:10px auto;display:block;text-align:center;color:#fff;}
  .play-btn{background:#facc15;color:#0f172a;border:none;}
  button:active{transform:scale(0.97);}
  .version{text-align:center;font-size:0.7rem;color:#94a3b8;margin-top:20px;}
  .back-btn{background:none;border:none;color:#3b82f6;font-size:1rem;cursor:pointer;display:inline-block;margin-bottom:16px;}
  .settings-list{display:flex;flex-direction:column;gap:12px;}
  .setting-item{background:rgba(255,255,255,0.05);border-radius:28px;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;}
  .help-content{background:rgba(255,255,255,0.05);border-radius:28px;padding:20px;line-height:2;}
  .stats-line{display:flex;justify-content:space-between;margin:12px 0;font-weight:bold;}
  .bar{background:#1e293b;border-radius:20px;height:18px;overflow:hidden;margin:8px 0;}
  .fillhp{background:#ef4444;height:100%;}.fillexp{background:#3b82f6;height:100%;}
  .enemy-icon{font-size:56px;margin:12px;text-align:center;font-weight:bold;}
  .log{background:rgba(0,0,0,0.5);border-radius:24px;padding:12px;margin:16px 0;font-size:0.85rem;color:#facc15;min-height:70px;}
  .buttons{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-top:16px;}
  .game-action{padding:12px 24px;border-radius:40px;font-weight:bold;border:none;background:#334155;color:#fff;font-size:1.2rem;cursor:pointer;}
  .attack{background:#dc2626;}.skill{background:#8b5cf6;}.rest{background:#16a34a;}.save{background:#9333ea;}
  .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:#facc15;padding:8px 20px;border-radius:40px;font-size:0.8rem;z-index:999;animation:fadeOut 2s forwards;}
  @keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0;visibility:hidden}}
  .switch{position:relative;display:inline-block;width:52px;height:28px;}
  .switch input{opacity:0;width:0;height:0;}
  .slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#475569;border-radius:34px;}
  .slider:before{position:absolute;content:"";height:22px;width:22px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:0.2s;}
  input:checked+.slider{background:#3b82f6;}
  input:checked+.slider:before{transform:translateX(24px);}
  input[type="range"]{width:160px;height:4px;-webkit-appearance:none;background:#475569;border-radius:2px;}
  input[type="range"]::-webkit-slider-thumb{width:18px;height:18px;border-radius:50%;background:#3b82f6;-webkit-appearance:none;}
  .difficulty-select{background:#0f172a;color:#fff;border:1px solid #475569;border-radius:20px;padding:6px 12px;}
  .guide-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:1000;display:flex;justify-content:center;align-items:center;}
  .guide-card{background:#1e293b;max-width:300px;padding:24px;border-radius:32px;text-align:center;border:1px solid #facc15;}
  .guide-card button{margin-top:16px;background:#facc15;border:none;padding:8px 20px;border-radius:40px;font-weight:bold;cursor:pointer;}
  .skill-menu-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:2000;display:flex;justify-content:center;align-items:center;}
  .skill-menu-card{background:#1e293b;width:280px;border-radius:32px;padding:16px;border:1px solid #facc15;text-align:center;}
  .skill-menu-card button{display:block;width:100%;margin:8px 0;padding:12px;border-radius:40px;background:#334155;color:#fff;border:none;font-weight:bold;cursor:pointer;}
</style>
</head>
<body>
<div class="app">
  <div id="mainPage" class="page active">
    <div class="main-title">MONSTER GAME</div>
    <button class="play-btn" id="toGameBtn">▶ 開始遊戲</button>
    <button class="settings-btn" id="toSettingsBtn">⚙️ 設定</button>
    <button class="settings-btn" id="shopBtn">🛒 商店</button>
    <button class="settings-btn" id="helpBtn">❓ 幫助</button>
    <div class="version">v2.0</div>
  </div>
  <div id="settingsPage" class="page">
    <div><button class="back-btn" id="backFromSettings">← 返回</button><span style="font-size:1.3rem;">設定</span></div>
    <div class="settings-list" id="settingsList"></div>
  </div>
  <div id="shopPage" class="page">
    <div><button class="back-btn" id="backFromShop">← 返回</button><span style="font-size:1.3rem;">商店</span></div>
    <div style="padding:16px;text-align:center;">
      <div id="dailyRewardStatus" style="background:rgba(255,255,255,0.1);border-radius:40px;padding:12px;margin-bottom:20px;">⭐ 每日獎勵</div>
      <button id="claimDailyBtn" class="play-btn" style="width:auto;padding:10px 20px;">🎁 領取每日獎勵</button>
      <div id="rewardMessage" style="margin-top:20px;"></div>
    </div>
  </div>
  <div id="helpPage" class="page">
    <div><button class="back-btn" id="backFromHelp">← 返回</button><span style="font-size:1.3rem;">幫助</span></div>
    <div class="help-content">
      <p>⚔️ 攻擊：穩定傷害</p><p>✨ 技能：點擊後選擇四種技能之一</p>
      <p>😴 休息：每場1次，恢復30HP，會被偷襲</p><p>📈 滿50經驗升級</p>
      <p>🎚️ 難度影響怪物強度</p><p>☁️ Google登入雲端存檔</p><p>🏆 成就自動記錄</p><p>🎁 每日獎勵每天一次</p>
    </div>
  </div>
  <div id="gamePage" class="page">
    <button class="back-btn" id="backFromGame" style="background:none;border:none;color:#3b82f6;">← 主選單</button>
    <div class="stats-line"><span>❤️ <span id="hpText">100/100</span></span><span>⭐ <span id="expText">0/50</span></span><span>⬆️ Lv <span id="levelText">1</span></span></div>
    <div class="bar"><div class="fillhp" id="hpBar"></div></div>
    <div class="bar"><div class="fillexp" id="expBar"></div></div>
    <div class="stats-line"><span>⚔️ <span id="atkText">10</span></span><span>🗺️ <span id="zoneText">新手村</span></span></div>
    <h3 id="monsterName">史萊姆</h3>
    <div class="enemy-icon" id="monsterEmoji">🟣</div>
    <div>💀 HP <span id="monsterHpText">0/0</span> | ⭐ Lv <span id="monsterLevelText">0</span></div>
    <div class="bar"><div class="fillhp" id="monsterBar"></div></div>
    <div class="log" id="logMsg">點擊攻擊開始</div>
    <div class="buttons">
      <button class="game-action attack" id="attackBtn">⚔️</button>
      <button class="game-action skill" id="skillBtn">✨</button>
      <button class="game-action rest" id="restBtn">😴</button>
      <button class="game-action save" id="saveBtn">💾</button>
    </div>
  </div>
</div>
<div id="guideOverlay" class="guide-overlay" style="display:none;"><div class="guide-card"><p>🎮 <strong>歡迎！</strong></p><p>⚔️攻擊｜✨技能選單｜😴休息(每場1次)</p><p>💾自動存檔</p><button id="closeGuideBtn">開始</button></div></div>
<script>
// ========== Emoji 自動對應表（新增時只需要在此加一行）==========
const emojiMap = {
  "🟣": "紫",
  "🟢": "綠",
  "🐺": "狼",
  "🐉": "龍",
  "🦂": "蠍",
  "🧻": "紙",
  "🐍": "蛇",
  "👼": "天使",
  "😈": "惡魔",
  "⭐": "星",
  "❤️": "心",
  "⚔️": "劍",
  "🔥": "火",
  "😴": "睡",
  "💾": "存",
  "🎁": "禮",
  "☁️": "雲",
  "🏆": "盃",
  "✨": "光",
  "😈": "魔",
  "💀": "骨"
};

function formatEmoji(emoji) {
  if (!emoji) return "";
  const text = emojiMap[emoji];
  if (text) return `${emoji}[${text}]`;
  return emoji; // 沒有對應文字就只顯示表情
}

// 應用在顯示怪物名稱、裝備名稱等地方
function formatMonsterName(emoji, name) {
  return `${formatEmoji(emoji)} ${name}`;
}

// ---------- Firebase 配置 ----------
const firebaseConfig = {
  apiKey: "AIzaSyDevirfNqjlg5hVkF6pgMMU9tfx7CDac4A",
  authDomain: "monster-game-f193f.firebaseapp.com",
  projectId: "monster-game-f193f",
  storageBucket: "monster-game-f193f.firebasestorage.app",
  messagingSenderId: "304101821779",
  appId: "1:304101821779:web:9b77e901083a7949f265a6"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth(), db = firebase.firestore(), provider = new firebase.auth.GoogleAuthProvider();
let currentUser = null;
function toast(msg,err=false){let d=document.createElement('div');d.className='toast';d.innerText=msg;d.style.color=err?'#ff8888':'#facc15';document.body.appendChild(d);setTimeout(()=>d.remove(),2000);}
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}

// ---------- 裝備系統 ----------
const QUALITY = [
  {name:'普通',color:'#9ca3af',min:1,max:3,rate:0.5},
  {name:'優秀',color:'#4ade80',min:4,max:6,rate:0.3},
  {name:'稀有',color:'#3b82f6',min:7,max:10,rate:0.15},
  {name:'史詩',color:'#a855f7',min:11,max:15,rate:0.05}
];
function randomQuality(){let r=Math.random(),a=0;for(let q of QUALITY)if((a+=q.rate)>r)return q;return QUALITY[0];}
function generateEquipment(){let t=rand(0,1)?'weapon':'armor',q=randomQuality(),b=rand(q.min,q.max);return{id:Date.now()+'-'+Math.random(),type:t,quality:q.name,color:q.color,bonus:b,name:`${q.name} ${t==='weapon'?'武器':'防具'}`,equipped:false};}
function calcEquipBonus(){let a=0,h=0;(window.equipment||[]).forEach(e=>{if(e.equipped)e.type==='weapon'?a+=e.bonus:h+=e.bonus;});return{atk:a,hp:h};}
function applyEquipBonus(){let b=calcEquipBonus();window.atk=window.baseAtk+b.atk;window.maxHp=window.baseHp+b.hp;if(window.hp>window.maxHp)window.hp=window.maxHp;updateUI();}

// ---------- 遊戲狀態 ----------
window.hp=100;window.maxHp=100;window.exp=0;window.lv=1;window.atk=10;
window.restUsed=false;window.curMonster=null;
window.difficulty=localStorage.getItem('difficulty')||'normal';
window.deathStreak=0;window.lastDmg=0;
window.equipment=[];window.baseAtk=10;window.baseHp=100;
window.totalKills=0;window.maxDamage=0;window.maxLevel=1;
const zones=[
  {name:"新手村",maxLv:30,mons:["🟣史萊姆","🟢哥布林","🐺森林狼"]},
  {name:"沙漠",maxLv:90,mons:["🦂巨蠍","🧻木乃伊","🐍沙蛇"]},
  {name:"蒼穹",maxLv:100,mons:["🐉青龍","👼天使","😈惡魔"]}
];
function getZone(){return window.lv<=30?zones[0]:window.lv<=90?zones[1]:zones[2];}
function getMult(){switch(window.difficulty){
  case 'easy':return{hp:0.7,atk:0.7,exp:1.1,off:-2};
  case 'hard':return{hp:1.5,atk:1.3,exp:0.85,off:3};
  case 'extreme':return{hp:2.0,atk:1.6,exp:0.7,off:6};
  default:return{hp:1,atk:1,exp:1,off:0};
}}
function genMonster(){
  let zone=getZone(),mons=zone.mons.length?zone.mons:["🟣史萊姆"];
  let raw=mons[Math.floor(Math.random()*mons.length)];
  let emoji=raw[0], name=raw.slice(1);
  let m=getMult();
  let off=m.off;
  if(window.deathStreak>=3&&window.difficulty!=='easy')off=Math.max(-5,off-Math.floor(window.deathStreak/2));
  let mlv=Math.max(1,window.lv+off);
  let baseHp=(30+mlv*2.5)*m.hp,baseAtk=(5+Math.floor(mlv/2.5))*m.atk;
  let varf=v=>Math.floor(v*(0.6+Math.random()*0.8));
  return{emoji,name,mlv,hp:varf(baseHp),maxHp:varf(baseHp),atk:varf(baseAtk),exp:Math.max(1,Math.floor((12+mlv*0.8)*m.exp))};
}
function refresh(){
  window.curMonster=genMonster();
  window.restUsed=false;
  updateUI();
  let displayName = formatMonsterName(window.curMonster.emoji, window.curMonster.name);
  log(`✨ ${displayName} Lv.${window.curMonster.mlv} | HP${window.curMonster.hp} 攻${window.curMonster.atk}`);
}
function updateUI(){
  document.getElementById('hpText').innerText=`${window.hp}/${window.maxHp}`;
  document.getElementById('expText').innerText=`${window.exp}/50`;
  document.getElementById('levelText').innerText=window.lv;
  document.getElementById('atkText').innerText=window.atk;
  document.getElementById('zoneText').innerHTML=getZone().name;
  if(window.curMonster){
    let displayName = formatMonsterName(window.curMonster.emoji, window.curMonster.name);
    document.getElementById('monsterName').innerHTML=displayName;
    document.getElementById('monsterEmoji').innerText=window.curMonster.emoji;
    document.getElementById('monsterHpText').innerText=`${window.curMonster.hp}/${window.curMonster.maxHp}`;
    document.getElementById('monsterLevelText').innerText=window.curMonster.mlv;
    document.getElementById('monsterBar').style.width=`${(window.curMonster.hp/window.curMonster.maxHp)*100}%`;
  }
  document.getElementById('hpBar').style.width=`${(window.hp/window.maxHp)*100}%`;
  document.getElementById('expBar').style.width=`${(window.exp/50)*100}%`;
  document.getElementById('restBtn').disabled=window.restUsed;
}
function log(msg){document.getElementById('logMsg
