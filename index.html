<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>幻獸鬥士 v1.2.0</title>
<style>
    body {
        margin: 0;
        background: #0f172a;
        color: white;
        font-family: Arial;
        text-align: center;
    }
    .topbar {
        background: #1e3a8a;
        padding: 18px;
        font-size: 26px;
        font-weight: bold;
    }
    .info, .battle, .log {
        background: #1e293b;
        margin: 15px;
        padding: 15px;
        border-radius: 20px;
    }
    .bar {
        width: 90%;
        height: 22px;
        background: #444;
        border-radius: 20px;
        margin: 10px auto;
        overflow: hidden;
    }
    .fillhp { height: 100%; background: #ef4444; width: 100%; }
    .fillexp { height: 100%; background: #3b82f6; width: 0%; }
    .enemy {
        font-size: 55px;
        margin: 15px 0;
    }
    .log {
        background: #fef3c7;
        color: black;
        font-weight: bold;
        min-height: 60px;
    }
    .buttons {
        margin: 20px;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
    }
    button {
        border: none;
        padding: 14px 24px;
        border-radius: 15px;
        font-size: 18px;
        font-weight: bold;
        color: white;
        cursor: pointer;
    }
    .attack { background: #dc2626; }
    .skill { background: #2563eb; }
    .rest { background: #16a34a; }
    .save { background: #9333ea; }
    button:active { transform: scale(0.97); }
</style>
</head>
<body>

<div class="topbar">🐉 幻獸鬥士 v1.2.0</div>

<div class="info">
    <div>❤️ HP：<span id="hpText">100 / 100</span></div>
    <div class="bar"><div class="fillhp" id="hpBar"></div></div>
    <div>⭐ EXP：<span id="expText">0 / 50</span></div>
    <div class="bar"><div class="fillexp" id="expBar"></div></div>
    <div>⬆️ 等級：<span id="levelText">1</span> &nbsp;|&nbsp; ⚔️ 攻擊力：<span id="atkText">10</span></div>
</div>

<div class="battle">
    <h2 id="monsterName">🟣 史萊姆</h2>
    <div class="enemy" id="monsterEmoji">🟣</div>
    <div>🧟 怪物 HP：<span id="monsterHpText">35 / 35</span></div>
    <div class="bar"><div class="fillhp" id="monsterBar"></div></div>
</div>

<div class="log" id="log">⚔️ 遊戲開始！</div>

<div class="buttons">
    <button class="attack" onclick="attack()">⚔️ 攻擊</button>
    <button class="skill" onclick="skill()">🔥 技能</button>
    <button class="rest" id="restBtn" onclick="rest()">😴 休息</button>
    <button class="save" onclick="saveGame()">💾 存檔</button>
</div>

<script src="game.js"></script>
</body>
</html>
